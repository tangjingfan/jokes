<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>I love jokes</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 48px 20px;
        font-family: "Georgia", "Times New Roman", serif;
        line-height: 1.8;
        color: #222;
        background: #f9f6ef;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 24px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
      }

      p {
        margin: 0 0 18px;
        font-size: 1.05rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>I love jokes</h1>

      <p>Add your jokes here.</p>
      <p>You can replace this text with any joke you like.</p>
      <p>
        Example: Why did the scarecrow win an award? Because he was outstanding
        in his field.
      </p>
    </main>
  </body>
</html>
